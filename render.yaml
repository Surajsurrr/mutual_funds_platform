# Render blueprint: one free web service (SPA + both APIs + workers) + free Postgres.
# Deploy: Render dashboard → New → Blueprint → pick this repo → Apply.
databases:
  - name: fundflow-db
    plan: free
    databaseName: fundflow
    user: fundflow

services:
  - type: web
    name: fundflow
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && cd backend && npm ci --omit=dev
    startCommand: cd backend && node scripts/deploy-start.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 22.19.0
      - key: NODE_ENV
        value: production
      - key: API_ROLE
        value: web
      - key: DATABASE_URL
        fromDatabase:
          name: fundflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
